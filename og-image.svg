<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="60%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="pillGrad" x1="0" y1="0" x2="300" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#94a3b8" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Glow orb top-right -->
  <circle cx="950" cy="150" r="200" fill="#0ea5e9" opacity="0.06"/>
  <!-- Glow orb bottom-left -->
  <circle cx="200" cy="500" r="180" fill="#6366f1" opacity="0.05"/>

  <!-- Logo icon -->
  <rect x="80" y="80" width="80" height="80" rx="18" fill="url(#logoGrad)"/>
  <path d="M100 106 L120 96 L140 106 V126 L120 140 L100 126 V106Z" stroke="white" stroke-width="2.5" fill="none" opacity="0.9"/>
  <path d="M120 96 V140 M100 106 L140 126 M140 106 L100 126" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <circle cx="120" cy="118" r="5" fill="white"/>

  <!-- Company name -->
  <text x="180" y="118" font-family="Inter, sans-serif" font-size="36" font-weight="700" fill="white" letter-spacing="1">宜路科技</text>
  <text x="180" y="145" font-family="Inter, sans-serif" font-size="16" font-weight="500" fill="#64748b" letter-spacing="4">YILU TECHNOLOGY CO., LTD</text>

  <!-- Divider line -->
  <line x1="80" y1="198" x2="1120" y2="198" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Main tagline -->
  <text x="80" y="285" font-family="Inter, sans-serif" font-size="52" font-weight="800" fill="url(#textGrad)">專業系統整合</text>
  <text x="80" y="360" font-family="Inter, sans-serif" font-size="52" font-weight="800" fill="white">企業資安防護</text>

  <!-- Subtitle -->
  <text x="80" y="415" font-family="Inter, sans-serif" font-size="22" font-weight="400" fill="#64748b">Dell Technologies 授權合作夥伴 · CrowdStrike · KnowBe4 · SecurityScorecard</text>

  <!-- Badges row -->
  <!-- Dell badge -->
  <rect x="80" y="460" width="220" height="50" rx="10" fill="url(#pillGrad)" stroke="rgba(14,165,233,0.3)" stroke-width="1"/>
  <text x="190" y="490" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#38bdf8" text-anchor="middle">Dell Technologies</text>

  <!-- CrowdStrike badge -->
  <rect x="316" y="460" width="220" height="50" rx="10" fill="rgba(232,55,44,0.1)" stroke="rgba(232,55,44,0.3)" stroke-width="1"/>
  <text x="426" y="490" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#f87171" text-anchor="middle">CrowdStrike</text>

  <!-- KnowBe4 badge -->
  <rect x="552" y="460" width="180" height="50" rx="10" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="642" y="490" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#fbbf24" text-anchor="middle">KnowBe4</text>

  <!-- SSC badge -->
  <rect x="748" y="460" width="260" height="50" rx="10" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="878" y="490" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#34d399" text-anchor="middle">SecurityScorecard</text>

  <!-- Website URL -->
  <text x="80" y="580" font-family="Inter, sans-serif" font-size="18" font-weight="500" fill="#475569">yilutech.com</text>
  <text x="1120" y="580" font-family="Inter, sans-serif" font-size="16" fill="#475569" text-anchor="end">(02) 2585-0055 · info@yilutech.com</text>
</svg>
